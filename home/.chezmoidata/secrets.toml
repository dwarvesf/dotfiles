[secrets]
# Key = "op://vault/item/field"  - one line per secret.
# Managed by the `add-secret` / `rm-secret` fish functions.
# Values are 1Password references, not secrets, so this file is safe to commit.
CLOUDFLARE_API_TOKEN = "op://Trading/Cloudflare API Token/credential"
R2_ACCESS_KEY_ID = "op://Trading/Cloudflare R2/username"
R2_SECRET_ACCESS_KEY = "op://Trading/Cloudflare R2/credential"
# OP_SERVICE_ACCOUNT_TOKEN is auto-loaded so subprocesses (Claude Code's Bash
# tool, scripts, etc.) inherit bearer auth. Daily fish `op` is intercepted
# by `home/dot_config/fish/functions/op.fish` to use biometric instead. S-49.
#
# The op:// ref below intentionally targets the personal "Private" vault
# (NOT Trading). The SA itself only has access to Trading; storing its own
# bootstrap there would let any process holding the SA token read its own
# credentials, defeating the scope boundary. The bootstrap is read via
# biometric/personal auth on first login, then cached in Keychain — so the
# Private-vault ref is never re-fetched at runtime in steady state.
#
# Cold-start on a remote machine (no biometric available, e.g. SSH context)
# requires pre-seeding via `dotfiles secret push OP_SERVICE_ACCOUNT_TOKEN
# ssh-target` from a machine that has it. See S-51.
OP_SERVICE_ACCOUNT_TOKEN = "op://Private/op-service-account-trading/credential"
